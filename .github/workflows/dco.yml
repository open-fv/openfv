# DCO sign-off check (PROJECT_PLAN.md §1.3: every commit carries a DCO sign-off).
#
# Verifies that every commit introduced by a pull request carries a
# `Signed-off-by:` trailer whose name+email match the commit's author. This is
# our enforcement of the Developer Certificate of Origin (https://developercertificate.org).
#
# Clean-room: this check is written here from the DCO definition (a trailer line
# of the form `Signed-off-by: Name <email>`); no third-party DCO action is used.
name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head with full history
        uses: actions/checkout@v4
        with:
          # Need both the PR head and the base so we can enumerate just the
          # commits this PR adds. fetch-depth 0 gets full history for the range.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Checking commits in range ${BASE_SHA}..${HEAD_SHA}"

          commits="$(git rev-list "${BASE_SHA}..${HEAD_SHA}")"
          if [ -z "${commits}" ]; then
            echo "No commits to check."
            exit 0
          fi

          fail=0
          for sha in ${commits}; do
            # Merge commits (>1 parent) are not authored content; skip them.
            parents="$(git rev-list --parents -n1 "${sha}" | wc -w)"
            if [ "${parents}" -gt 2 ]; then
              echo "skip (merge)   ${sha}"
              continue
            fi

            author_name="$(git show -s --format='%an' "${sha}")"
            author_email="$(git show -s --format='%ae' "${sha}")"
            subject="$(git show -s --format='%s' "${sha}")"
            expected="Signed-off-by: ${author_name} <${author_email}>"

            # Collect every Signed-off-by trailer on the commit body.
            if git show -s --format='%B' "${sha}" \
                 | grep -qiF "${expected}"; then
              echo "ok             ${sha}  ${subject}"
            else
              echo "MISSING DCO    ${sha}  ${subject}"
              echo "               expected trailer: ${expected}"
              fail=1
            fi
          done

          if [ "${fail}" -ne 0 ]; then
            echo ""
            echo "::error::One or more commits lack a matching DCO sign-off."
            echo "Fix with:  git commit --amend -s   (or rebase -i and sign each)."
            echo "See CONTRIBUTING.md and PROJECT_PLAN.md §1.3."
            exit 1
          fi
          echo "All commits carry a matching DCO sign-off."
